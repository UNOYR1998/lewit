<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order — Lewit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy-950: #050a15; --navy-900: #070d1a; --navy-800: #0b1428;
      --navy-700: #111d38; --navy-600: #1a2d4a;
      --gold-600: #a8842e; --gold-500: #c8a24e; --gold-400: #d4b366;
      --gold-300: #e6c76a; --gold-200: #f0d98a; --gold-100: #faf0d4;
      --cream: #f9f8f5; --cream-dark: #f0ede6; --white: #ffffff;
      --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
      --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563;
      --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
      --green: #22c55e; --blue: #3b82f6;
      --font-heading: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
      --shadow-gold: 0 4px 24px rgba(200,162,78,0.25);
      --radius: 12px; --radius-lg: 20px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body); color: var(--gray-800);
      background: var(--cream); line-height: 1.6; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    h1,h2,h3,h4,h5,h6 { font-family: var(--font-heading); line-height: 1.2; }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(249,248,245,0.92); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 14px 0; box-shadow: 0 1px 0 var(--gray-200);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-heading); font-weight: 800; font-size: 1.5rem;
      text-decoration: none; color: var(--navy-800); letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--gold-400); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-link {
      text-decoration: none; font-size: 0.9rem; font-weight: 500;
      color: var(--gray-600); transition: var(--transition);
    }
    .nav-link:hover { color: var(--gold-500); }
    .btn-admin {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 20px; border-radius: 50px; border: 1.5px solid var(--gray-200);
      background: var(--white); color: var(--gray-700);
      font-family: var(--font-heading); font-weight: 600; font-size: 0.82rem;
      text-decoration: none; cursor: pointer; transition: var(--transition);
    }
    .btn-admin:hover { border-color: var(--gold-400); color: var(--gold-600); }

    /* HERO */
    .track-hero {
      background: var(--navy-900); padding: 140px 24px 80px;
      position: relative; overflow: hidden; text-align: center;
    }
    .track-hero::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 80%, rgba(200,162,78,0.1) 0%, transparent 60%),
        var(--navy-900);
    }
    .track-hero-content { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
    .track-hero h1 {
      font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 800; color: var(--white);
      margin-bottom: 12px; letter-spacing: -0.02em;
    }
    .track-hero p { color: rgba(255,255,255,0.5); font-size: 1rem; margin-bottom: 40px; }

    .search-box {
      display: flex; gap: 0; max-width: 480px; margin: 0 auto;
      background: var(--white); border-radius: 60px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }
    .search-box input {
      flex: 1; border: none; outline: none; padding: 18px 28px;
      font-family: var(--font-body); font-size: 1rem; color: var(--gray-800);
      background: transparent;
    }
    .search-box input::placeholder { color: var(--gray-400); }
    .search-box button {
      padding: 18px 32px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--gold-500), var(--gold-300));
      color: var(--navy-900); font-family: var(--font-heading);
      font-weight: 700; font-size: 0.9rem; transition: var(--transition);
      white-space: nowrap;
    }
    .search-box button:hover { background: linear-gradient(135deg, var(--gold-400), var(--gold-200)); }

    /* RESULTS */
    .results-section { padding: 60px 24px 100px; min-height: 300px; }
    .results-container { max-width: 700px; margin: 0 auto; }

    /* Not Found */
    .not-found {
      text-align: center; padding: 60px 20px;
      animation: fadeIn 0.4s ease;
    }
    .not-found-icon {
      width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 24px;
      background: var(--gray-100); display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--gray-400);
    }
    .not-found h3 { font-size: 1.3rem; color: var(--navy-800); margin-bottom: 8px; }
    .not-found p { color: var(--gray-500); font-size: 0.95rem; }

    /* Order Card */
    .order-card {
      background: var(--white); border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200); overflow: hidden;
      box-shadow: var(--shadow-md); animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    .order-header {
      padding: 28px 32px; border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .order-id {
      font-family: var(--font-heading); font-size: 1.6rem; font-weight: 800;
      color: var(--navy-800); letter-spacing: -0.01em;
    }
    .order-id-label { font-size: 0.78rem; color: var(--gray-400); font-weight: 500; margin-bottom: 2px; }
    .order-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .order-customer { font-weight: 600; color: var(--gray-700); font-size: 0.95rem; }
    .order-items { font-size: 0.85rem; color: var(--gray-500); max-width: 260px; text-align: right; }

    /* STEPPER */
    .stepper-section { padding: 40px 32px; }
    .stepper {
      display: flex; align-items: flex-start; justify-content: space-between;
      position: relative; padding: 0 10px;
    }
    .stepper-track {
      position: absolute; top: 24px; left: 34px; right: 34px;
      height: 3px; background: var(--gray-200); border-radius: 3px; z-index: 0;
    }
    .stepper-track-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--gold-500), var(--gold-400));
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .step {
      display: flex; flex-direction: column; align-items: center;
      position: relative; z-index: 1; flex: 1;
    }
    .step-circle {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all 0.4s ease;
      border: 3px solid var(--gray-200); background: var(--white); color: var(--gray-400);
      position: relative;
    }
    .step.completed .step-circle {
      background: linear-gradient(135deg, var(--gold-500), var(--gold-400));
      border-color: var(--gold-500); color: var(--white);
      box-shadow: 0 4px 16px rgba(200,162,78,0.3);
    }
    .step.active .step-circle {
      border-color: var(--gold-500); color: var(--gold-600);
      background: var(--gold-100);
      box-shadow: 0 0 0 6px rgba(200,162,78,0.1);
    }
    .step.active .step-circle::after {
      content: ''; position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid rgba(200,162,78,0.3);
      animation: stepPulse 2s ease-in-out infinite;
    }
    @keyframes stepPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0; }
    }
    .step-label {
      margin-top: 14px; font-size: 0.78rem; font-weight: 600;
      color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.06em;
      transition: var(--transition); text-align: center;
    }
    .step.completed .step-label, .step.active .step-label { color: var(--gray-800); }
    .step-sublabel {
      font-size: 0.7rem; color: var(--gray-400); margin-top: 2px;
    }
    .step.completed .step-sublabel { color: var(--gold-600); }

    /* Order Details */
    .order-details {
      padding: 24px 32px; background: var(--cream);
      border-top: 1px solid var(--gray-100);
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;
    }
    .detail-item label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .detail-item span { font-size: 0.92rem; font-weight: 600; color: var(--gray-800); }

    /* Status Badge */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 50px; font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-agent { background: #dbeafe; color: #1e40af; }
    .status-shipped { background: #e0e7ff; color: #3730a3; }
    .status-delivered { background: #d1fae5; color: #065f46; }

    /* Loading */
    .loading {
      text-align: center; padding: 60px 20px;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--gray-200);
      border-top-color: var(--gold-500); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--gray-500); font-size: 0.9rem; }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 14px 24px; border-radius: var(--radius); color: var(--white);
      font-size: 0.88rem; font-weight: 500; transform: translateX(120%);
      transition: transform 0.3s ease; box-shadow: var(--shadow-lg);
    }
    .toast.show { transform: translateX(0); }
    .toast-error { background: #ef4444; }

    @media (max-width: 600px) {
      .order-header { padding: 20px; flex-direction: column; }
      .order-meta { align-items: flex-start; }
      .order-items { text-align: left; }
      .stepper-section { padding: 32px 16px; }
      .step-label { font-size: 0.68rem; }
      .step-circle { width: 40px; height: 40px; font-size: 0.85rem; }
      .stepper-track { top: 20px; left: 24px; right: 24px; }
      .order-details { grid-template-columns: 1fr; padding: 20px; gap: 16px; }
      .search-box { flex-direction: column; border-radius: 20px; }
      .search-box button { border-radius: 0 0 16px 16px; padding: 16px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">LEW<span>IT</span></a>
      <div class="nav-right">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-arrow-left" style="margin-right:6px"></i> Back</a>
        <a href="admin.html" class="btn-admin"><i class="fa-solid fa-lock"></i> Admin</a>
      </div>
    </div>
  </nav>

  <section class="track-hero">
    <div class="track-hero-content">
      <h1>Track Your Order</h1>
      <p>Enter your 7-digit order code to see real-time shipment status.</p>
      <div class="search-box">
        <input type="text" id="orderInput" placeholder="e.g. 4829105" maxlength="7" inputmode="numeric">
        <button onclick="trackOrder()"><i class="fa-solid fa-magnifying-glass" style="margin-right:6px"></i> Track</button>
      </div>
    </div>
  </section>

  <section class="results-section">
    <div class="results-container" id="resultsContainer"></div>
  </section>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API_KEY = '$2a$10$aNNDj3zvmMQCq2VNC4Y9O.MRmJFSSLHC4kkdXH91a54RsU4o4RFu6';
    const BIN_ID = '6a3ba519f5f4af5e29280402';
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

    const STATUSES = ['pending', 'agent', 'shipped', 'delivered'];
    const STATUS_LABELS = {
      pending: 'Pending (Paid)',
      agent: 'With Agent',
      shipped: 'Shipped',
      delivered: 'Delivered'
    };
    const STATUS_ICONS = {
      pending: 'fa-credit-card',
      agent: 'fa-user-tie',
      shipped: 'fa-ship',
      delivered: 'fa-circle-check'
    };
    const STATUS_SUBLABELS = {
      pending: 'Payment confirmed',
      agent: 'Processing order',
      shipped: 'In transit',
      delivered: 'Order complete'
    };

    // Enter key
    document.getElementById('orderInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') trackOrder();
    });

    // Only allow numbers
    document.getElementById('orderInput').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '');
    });

    async function fetchOrders() {
      const res = await fetch(API_URL, { headers: { 'X-Master-Key': API_KEY } });
      if (!res.ok) throw new Error('Failed to fetch orders');
      const data = await res.json();
      return data.record.orders || [];
    }

    function showToast(msg, type = 'error') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      document.getElementById('toastContainer').appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function renderNotFound(code) {
      return `
        <div class="not-found">
          <div class="not-found-icon"><i class="fa-solid fa-box-open"></i></div>
          <h3>No order found</h3>
          <p>We couldn't find an order with code <strong>${code}</strong>. Please double-check and try again.</p>
        </div>
      `;
    }

    function renderOrder(order) {
      const currentIdx = STATUSES.indexOf(order.status);
      const fillPercent = currentIdx === 0 ? 0 : (currentIdx / (STATUSES.length - 1)) * 100;

      let stepsHTML = STATUSES.map((s, i) => {
        let cls = '';
        if (i < currentIdx) cls = 'completed';
        else if (i === currentIdx) cls = 'active';
        return `
          <div class="step ${cls}">
            <div class="step-circle"><i class="fa-solid ${STATUS_ICONS[s]}"></i></div>
            <div class="step-label">${STATUS_LABELS[s]}</div>
            <div class="step-sublabel">${cls === 'completed' ? 'Completed' : cls === 'active' ? STATUS_SUBLABELS[s] : 'Upcoming'}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id-label">Order Number</div>
              <div class="order-id">#${order.orderId}</div>
            </div>
            <div class="order-meta">
              <span class="status-badge status-${order.status}">${STATUS_LABELS[order.status]}</span>
              <div class="order-customer">${order.customerName}</div>
              <div class="order-items">${order.items}</div>
            </div>
          </div>
          <div class="stepper-section">
            <div class="stepper">
              <div class="stepper-track"><div class="stepper-track-fill" style="width:${fillPercent}%"></div></div>
              ${stepsHTML}
            </div>
          </div>
          <div class="order-details">
            <div class="detail-item">
              <label>Items</label>
              <span>${order.items}</span>
            </div>
            <div class="detail-item">
              <label>Created</label>
              <span>${formatDate(order.createdAt)}</span>
            </div>
            <div class="detail-item">
              <label>Last Updated</label>
              <span>${formatDate(order.lastUpdated)}</span>
            </div>
          </div>
        </div>
      `;
    }

    async function trackOrder() {
      const code = document.getElementById('orderInput').value.trim();
      const container = document.getElementById('resultsContainer');

      if (code.length !== 7) {
        showToast('Please enter a valid 7-digit order code.');
        return;
      }

      container.innerHTML = `<div class="loading"><div class="spinner"></div><p>Looking up your order...</p></div>`;

      try {
        const orders = await fetchOrders();
        const order = orders.find(o => o.orderId === code);
        container.innerHTML = order ? renderOrder(order) : renderNotFound(code);
      } catch (err) {
        container.innerHTML = `<div class="not-found">
          <div class="not-found-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <h3>Something went wrong</h3>
          <p>Unable to fetch order data. Please try again in a moment.</p>
        </div>`;
        showToast('Network error. Please try again.');
      }
    }
  </script>
</body>
</html>
